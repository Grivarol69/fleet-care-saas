<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="#1E3A5F"/>

  <!-- Truck body -->
  <rect x="60" y="220" width="280" height="160" rx="16" fill="#FFFFFF"/>
  <!-- Truck cab -->
  <path d="M340 300 L340 220 L420 220 Q460 220 460 260 L460 300 Z" fill="#FFFFFF"/>
  <!-- Windshield -->
  <path d="M348 228 L348 292 L452 292 L452 262 Q452 228 420 228 Z" fill="#1E3A5F" opacity="0.3"/>

  <!-- Wheels -->
  <circle cx="140" cy="390" r="36" fill="#1E3A5F"/>
  <circle cx="140" cy="390" r="18" fill="#FFFFFF"/>
  <circle cx="300" cy="390" r="36" fill="#1E3A5F"/>
  <circle cx="300" cy="390" r="18" fill="#FFFFFF"/>
  <circle cx="410" cy="390" r="36" fill="#1E3A5F"/>
  <circle cx="410" cy="390" r="18" fill="#FFFFFF"/>

  <!-- Checklist overlay (top-right) -->
  <rect x="320" y="60" width="140" height="160" rx="12" fill="#16A34A"/>
  <line x1="345" y1="105" x2="435" y2="105" stroke="white" stroke-width="10" stroke-linecap="round"/>
  <line x1="345" y1="135" x2="435" y2="135" stroke="white" stroke-width="10" stroke-linecap="round"/>
  <line x1="345" y1="165" x2="395" y2="165" stroke="white" stroke-width="10" stroke-linecap="round"/>
  <!-- Checkmark -->
  <polyline points="338,195 358,215 435,155" fill="none" stroke="white" stroke-width="12" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
