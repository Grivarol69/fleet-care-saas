<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 100" fill="none">
  <!-- Ambulance: boxy van with cross -->
  <rect x="15" y="30" width="165" height="47" rx="5" fill="#dc2626"/>
  <rect x="15" y="22" width="165" height="10" rx="4" fill="#ef4444"/>
  <!-- White stripe -->
  <rect x="15" y="52" width="165" height="10" fill="white"/>
  <!-- Cab windshield -->
  <path d="M148 30 L160 16 L180 16 L180 30Z" fill="#fca5a5"/>
  <rect x="150" y="20" width="22" height="8" rx="2" fill="#bfdbfe"/>
  <!-- Medical cross on side -->
  <rect x="60" y="34" width="8" height="20" rx="2" fill="white"/>
  <rect x="54" y="40" width="20" height="8" rx="2" fill="white"/>
  <!-- Red cross second position -->
  <rect x="95" y="34" width="8" height="20" rx="2" fill="white"/>
  <rect x="89" y="40" width="20" height="8" rx="2" fill="white"/>
  <!-- Emergency lights on roof -->
  <rect x="60" y="18" width="15" height="6" rx="3" fill="#3b82f6"/>
  <rect x="80" y="18" width="15" height="6" rx="3" fill="#ef4444"/>
  <rect x="100" y="18" width="15" height="6" rx="3" fill="#3b82f6"/>
  <!-- Wheels -->
  <circle cx="50" cy="80" r="12" fill="#1e3a8a"/>
  <circle cx="50" cy="80" r="5" fill="#93c5fd"/>
  <circle cx="150" cy="80" r="12" fill="#1e3a8a"/>
  <circle cx="150" cy="80" r="5" fill="#93c5fd"/>
  <rect x="15" y="52" width="8" height="5" rx="1" fill="#fbbf24"/>
  <rect x="172" y="52" width="8" height="5" rx="1" fill="#fbbf24"/>
</svg>
