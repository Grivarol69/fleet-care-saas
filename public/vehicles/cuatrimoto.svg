<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 100" fill="none">
  <!-- ATV/Cuatrimoto: 4 fat wheels, boxy body -->
  <!-- Body -->
  <rect x="55" y="35" width="90" height="32" rx="8" fill="#2563eb"/>
  <!-- Rack front -->
  <rect x="135" y="42" width="22" height="8" rx="3" fill="#1d4ed8"/>
  <!-- Rack rear -->
  <rect x="43" y="42" width="14" height="8" rx="3" fill="#1d4ed8"/>
  <!-- Seat -->
  <rect x="68" y="28" width="64" height="10" rx="5" fill="#1e3a8a"/>
  <!-- Handlebars -->
  <rect x="132" y="25" width="24" height="5" rx="2" fill="#64748b"/>
  <rect x="143" y="20" width="4" height="12" rx="2" fill="#64748b"/>
  <!-- Fuel tank area -->
  <rect x="82" y="36" width="36" height="12" rx="3" fill="#1e40af"/>
  <!-- 4 fat wheels -->
  <circle cx="52" cy="72" r="16" fill="none" stroke="#1e3a8a" stroke-width="9"/>
  <circle cx="52" cy="72" r="5" fill="#93c5fd"/>
  <circle cx="148" cy="72" r="16" fill="none" stroke="#1e3a8a" stroke-width="9"/>
  <circle cx="148" cy="72" r="5" fill="#93c5fd"/>
  <circle cx="38" cy="72" r="8" fill="none" stroke="#2563eb" stroke-width="5"/>
  <circle cx="162" cy="72" r="8" fill="none" stroke="#2563eb" stroke-width="5"/>
</svg>
