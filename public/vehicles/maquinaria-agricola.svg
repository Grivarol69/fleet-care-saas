<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 100" fill="none">
  <!-- Tractor: large rear wheels, small front wheels -->
  <!-- Body/hood -->
  <rect x="85" y="30" width="75" height="35" rx="4" fill="#15803d"/>
  <!-- Exhaust -->
  <rect x="148" y="14" width="6" height="18" rx="3" fill="#374151"/>
  <!-- Cab -->
  <rect x="88" y="18" width="45" height="20" rx="3" fill="#16a34a"/>
  <rect x="92" y="21" width="18" height="12" rx="2" fill="#bbf7d0"/>
  <rect x="113" y="21" width="16" height="12" rx="2" fill="#bbf7d0"/>
  <!-- Large rear wheels -->
  <circle cx="78" cy="72" r="22" fill="none" stroke="#1e3a8a" stroke-width="9"/>
  <circle cx="78" cy="72" r="8" fill="#93c5fd"/>
  <!-- Tread lines on rear wheel -->
  <line x1="78" y1="50" x2="78" y2="94" stroke="#1e3a8a" stroke-width="2.5"/>
  <line x1="56" y1="72" x2="100" y2="72" stroke="#1e3a8a" stroke-width="2.5"/>
  <!-- Small front wheels -->
  <circle cx="155" cy="76" r="12" fill="none" stroke="#1e3a8a" stroke-width="6"/>
  <circle cx="155" cy="76" r="4" fill="#93c5fd"/>
  <!-- Hitch -->
  <rect x="18" y="68" width="30" height="5" rx="2" fill="#374151"/>
  <rect x="14" y="66" width="6" height="9" rx="2" fill="#374151"/>
</svg>
